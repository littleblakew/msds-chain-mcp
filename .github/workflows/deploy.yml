name: Deploy MCP Server

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-mcp-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

env:
  ACR_LOGIN_SERVER: acrmsdschain.azurecr.io
  RESOURCE_GROUP: rg-msds-chain-dev
  APP_NAME: msds-chain-mcp

jobs:
  deploy:
    runs-on: [self-hosted, azure-sea]
    environment:
      name: production
      url: https://mcp.lagentbot.com/health
    steps:
      - uses: actions/checkout@v5

      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR Login
        run: az acr login --name acrmsdschain

      - name: Build & Push image
        run: |
          IMAGE="${ACR_LOGIN_SERVER}/msds-chain-mcp:${{ github.sha }}"
          IMAGE_LATEST="${ACR_LOGIN_SERVER}/msds-chain-mcp:latest"

          docker buildx build \
            --push \
            --cache-from type=registry,ref=${ACR_LOGIN_SERVER}/msds-chain-mcp:cache \
            --cache-to type=registry,ref=${ACR_LOGIN_SERVER}/msds-chain-mcp:cache,mode=max \
            -t "${IMAGE}" \
            -t "${IMAGE_LATEST}" \
            .

          echo "IMAGE=${IMAGE}" >> $GITHUB_ENV

      - name: Deploy to Container App
        run: |
          az containerapp update \
            --name ${{ env.APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.IMAGE }}

      - name: Health check
        run: |
          sleep 10
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://mcp.lagentbot.com/health)
          if [ "$STATUS" != "200" ]; then
            echo "::error::Health check failed (HTTP $STATUS)"
            exit 1
          fi
          echo "✅ Health check passed"
